; AI Boost — XML Sitemap Plugin Language File (en-GB)
PLG_SYSTEM_AIBOOST_SITEMAP="AI Boost — XML Sitemap"
PLG_SYSTEM_AIBOOST_SITEMAP_XML_DESCRIPTION="Generates a dynamic /sitemap.xml with articles, menu items and categories. Pro: image entries, hreflang alternates, sitemap index, news sitemap, auto-ping."

; ── License ──────────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SITEMAP_FIELDSET_LICENSE="License"
PLG_SYSTEM_AIBOOST_SITEMAP_LICENSE_KEY_LABEL="License Key"
PLG_SYSTEM_AIBOOST_SITEMAP_LICENSE_KEY_DESC="Enter your AI Boost license key to activate Pro features. Get your key at aiboostnow.com. Leave blank to use the Free tier."
PLG_SYSTEM_AIBOOST_SITEMAP_LICENSE_STATUS_LABEL="License Status"
PLG_SYSTEM_AIBOOST_SITEMAP_LICENSE_STATUS_DESC="Shows your current tier (Free or Professional). Updated automatically when you save a valid license key."

; ── Basic Sitemap ─────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SITEMAP_FIELDSET_BASIC="Sitemap — Basic"
PLG_SYSTEM_AIBOOST_SITEMAP_ENABLE_LABEL="Enable Sitemap"
PLG_SYSTEM_AIBOOST_SITEMAP_ENABLE_DESC="Serve /sitemap.xml dynamically on every request. No static file needed."
PLG_SYSTEM_AIBOOST_SITEMAP_INCLUDE_ARTICLES_LABEL="Include Articles"
PLG_SYSTEM_AIBOOST_SITEMAP_INCLUDE_ARTICLES_DESC="Add all published Joomla articles to the sitemap."
PLG_SYSTEM_AIBOOST_SITEMAP_INCLUDE_MENU_LABEL="Include Menu Items"
PLG_SYSTEM_AIBOOST_SITEMAP_INCLUDE_MENU_DESC="Add published front-end menu items (component links) to the sitemap."
PLG_SYSTEM_AIBOOST_SITEMAP_INCLUDE_CATEGORIES_LABEL="Include Categories"
PLG_SYSTEM_AIBOOST_SITEMAP_INCLUDE_CATEGORIES_DESC="Add published content categories to the sitemap."
PLG_SYSTEM_AIBOOST_SITEMAP_CHANGEFREQ_LABEL="Default Change Frequency"
PLG_SYSTEM_AIBOOST_SITEMAP_CHANGEFREQ_DESC="How often search engines should re-crawl URLs. Applied to articles; menu items and categories use 'monthly'."
PLG_SYSTEM_AIBOOST_SITEMAP_PRIORITY_LABEL="Default Priority"
PLG_SYSTEM_AIBOOST_SITEMAP_PRIORITY_DESC="Default importance of URLs relative to each other (0.1 = least, 1.0 = most). Use the Pro tab to set per-type priorities."

