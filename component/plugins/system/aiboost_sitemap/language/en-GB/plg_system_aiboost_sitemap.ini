PLG_SYSTEM_AIBOOST_SITEMAP_FREQ_WEEKLY="Weekly"
PLG_SYSTEM_AIBOOST_SITEMAP_FREQ_MONTHLY="Monthly"
PLG_SYSTEM_AIBOOST_SITEMAP_FREQ_YEARLY="Yearly"
PLG_SYSTEM_AIBOOST_SITEMAP_FREQ_NEVER="Never"

; ── Pro Options ───────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SITEMAP_FIELDSET_PRO="Sitemap — Pro Features"
PLG_SYSTEM_AIBOOST_SITEMAP_PRO_ONLY="Pro only"
PLG_SYSTEM_AIBOOST_SITEMAP_IMAGE_LABEL="Enable Image Sitemap [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_IMAGE_DESC="Add <image:image> entries for articles with an intro image. Helps Google Image Search discover and index your article images."
PLG_SYSTEM_AIBOOST_SITEMAP_HREFLANG_LABEL="Enable Hreflang in Sitemap [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_HREFLANG_DESC="Add <xhtml:link rel='alternate' hreflang='...'> entries using Joomla language associations (#__associations). Requires Joomla multilingual setup."
PLG_SYSTEM_AIBOOST_SITEMAP_INDEX_LABEL="Enable Sitemap Index [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_INDEX_DESC="For sites with more URLs than the chunk limit, automatically split into /sitemap-1.xml, /sitemap-2.xml, ... and serve a /sitemap-index.xml index file."
PLG_SYSTEM_AIBOOST_SITEMAP_LIMIT_LABEL="URLs per Sitemap Chunk [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_LIMIT_DESC="Maximum number of URLs per child sitemap file when sitemap index is enabled. Google recommends no more than 50,000."
PLG_SYSTEM_AIBOOST_SITEMAP_EXCLUDE_MENU_LABEL="Exclude Menu Item IDs [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_EXCLUDE_MENU_DESC="Comma-separated list of Joomla menu item IDs to exclude from the sitemap. Example: 42, 55, 101"
PLG_SYSTEM_AIBOOST_SITEMAP_EXCLUDE_CAT_LABEL="Exclude Category IDs [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_EXCLUDE_CAT_DESC="Comma-separated list of Joomla category IDs to exclude from the sitemap. Articles in excluded categories are also skipped."
PLG_SYSTEM_AIBOOST_SITEMAP_PRIO_HOME_LABEL="Homepage Priority [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_PRIO_HOME_DESC="Sitemap priority for the homepage. Recommended: 1.0."
PLG_SYSTEM_AIBOOST_SITEMAP_PRIO_ARTICLES_LABEL="Article Priority [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_PRIO_ARTICLES_DESC="Sitemap priority for individual articles. Recommended: 0.8."
PLG_SYSTEM_AIBOOST_SITEMAP_PRIO_CATS_LABEL="Category Priority [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_PRIO_CATS_DESC="Sitemap priority for category pages. Recommended: 0.6."
PLG_SYSTEM_AIBOOST_SITEMAP_INC_TAGS_LABEL="Include Tags [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_INC_TAGS_DESC="Include Joomla tag pages in the sitemap. Only tags with at least one published item will be included."
PLG_SYSTEM_AIBOOST_SITEMAP_PRIO_TAGS_LABEL="Tag Priority [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_PRIO_TAGS_DESC="Sitemap priority for tag pages. Recommended: 0.4."
; ── News Sitemap ──────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SITEMAP_FIELDSET_NEWS="News Sitemap [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_NEWS_ENABLE_LABEL="Enable News Sitemap [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_NEWS_ENABLE_DESC="Serve /sitemap-news.xml with articles published in the last 48 hours. Required for Google News indexing."
PLG_SYSTEM_AIBOOST_SITEMAP_NEWS_CATID_LABEL="News Category ID [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_NEWS_CATID_DESC="Joomla category ID containing your news articles. Only articles in this category will appear in the news sitemap."
PLG_SYSTEM_AIBOOST_SITEMAP_NEWS_PUBNAME_LABEL="Publication Name [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_NEWS_PUBNAME_DESC="The name of your publication as it should appear in Google News. Usually your site name."

; ── Ping ──────────────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SITEMAP_FIELDSET_PING="Ping Search Engines"
PLG_SYSTEM_AIBOOST_SITEMAP_PING_GOOGLE_LABEL="Ping Google"
PLG_SYSTEM_AIBOOST_SITEMAP_PING_GOOGLE_DESC="Notify Google about your sitemap when an article is published (Pro auto-ping) or when you use the manual ping button."
PLG_SYSTEM_AIBOOST_SITEMAP_PING_BING_LABEL="Ping Bing"
PLG_SYSTEM_AIBOOST_SITEMAP_PING_BING_DESC="Notify Bing/Copilot about your sitemap when an article is published (Pro auto-ping) or when you use the manual ping button."
PLG_SYSTEM_AIBOOST_SITEMAP_PING_ON_PUBLISH_LABEL="Auto-Ping on Publish [Pro]"
PLG_SYSTEM_AIBOOST_SITEMAP_PING_ON_PUBLISH_DESC="Automatically ping Google and/or Bing every time an article is saved as published or its state changes to Published. Requires a Pro license."
