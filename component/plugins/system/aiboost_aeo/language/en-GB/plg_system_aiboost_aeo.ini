; ── Markdown Pages (Pro) ────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_AEO_FIELDSET_MARKDOWN_PAGES="Markdown Pages — AI Agent Endpoint [Pro]"
PLG_SYSTEM_AIBOOST_AEO_MARKDOWN_PAGES_LABEL="Serve Pages as Markdown"
PLG_SYSTEM_AIBOOST_AEO_MARKDOWN_PAGES_DESC="Serve a clean Markdown version of any public page for AI agents. Three triggers: append .md to the URL (e.g. /article.md), add ?markdown=1, or send an Accept: text/markdown header. Also injects a <link rel=\"alternate\" type=\"text/markdown\"> tag in <head> so agents can auto-discover the Markdown URL. Output strips navigation, sidebars, and scripts — only the main content region is kept."

; ── AI Signals (Pro) ────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_AEO_FIELDSET_AI_SIGNALS="AI Signals [Pro]"
PLG_SYSTEM_AIBOOST_AEO_ENABLE_AI_META_TAGS_LABEL="Inject AI Meta Tags"
PLG_SYSTEM_AIBOOST_AEO_ENABLE_AI_META_TAGS_DESC="Add AI-specific meta tags to every page: <meta name=\"ai-content-verified\" content=\"true\"> and <meta name=\"llms-txt\" content=\"/llms.txt\">. These signal to AI crawlers that your content is verified and indexable."
PLG_SYSTEM_AIBOOST_AEO_ENABLE_X_ROBOTS_HEADER_LABEL="Send X-Robots-Tag Header"
PLG_SYSTEM_AIBOOST_AEO_ENABLE_X_ROBOTS_HEADER_DESC="Add an X-Robots-Tag: index, follow HTTP response header to every page. This reinforces your robots.txt directives for AI crawlers that read HTTP headers."
