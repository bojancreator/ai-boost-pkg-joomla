; ── IndexNow (Pro) ──────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_AEO_FIELDSET_INDEXNOW="IndexNow — Real-Time URL Submission [Pro]"
PLG_SYSTEM_AIBOOST_AEO_INDEXNOW_API_KEY_LABEL="IndexNow API Key"
PLG_SYSTEM_AIBOOST_AEO_INDEXNOW_API_KEY_DESC="Your IndexNow verification key. The plugin will serve it at /{key}.txt for Bing/Yandex to verify site ownership. Generate a random UUID-style string at indexnow.org. Example: a1b2c3d4e5f6..."
PLG_SYSTEM_AIBOOST_AEO_INDEXNOW_AUTO_SUBMIT_LABEL="Auto-Submit on Publish"
