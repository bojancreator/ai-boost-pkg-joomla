PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_RECENT_ARTICLES_DESC="Number of most recently published articles to include in /llms.txt. Set to 0 to disable. Recommended: 5–10. Maximum: 50."
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_CUSTOM_PAGES_LABEL="Custom Pages (JSON)"
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_CUSTOM_PAGES_DESC="Additional pages to include in /llms.txt. Enter as a JSON array. Example: [{\"title\":\"About Us\",\"url\":\"/about\",\"description\":\"Our company story\"},{\"title\":\"Shop\",\"url\":\"https://shop.example.com\",\"description\":\"Our online store\"}]"
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_INCLUDE_ABOUT_LABEL="Include About Section"
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_INCLUDE_ABOUT_DESC="Add the About section to /llms.txt with organization type, country, phone, email, and rating. Populated from the Organization tab."
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_INCLUDE_SOCIALS_LABEL="Include Social Media"
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_INCLUDE_SOCIALS_DESC="Add a Social Media section to /llms.txt with your social profile links. Populated from the Organization tab."
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_INCLUDE_FAQ_LABEL="Include FAQ"
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_INCLUDE_FAQ_DESC="Add a Frequently Asked Questions section to /llms.txt. AI engines use this for direct-answer extraction. Enter FAQ items in the field below."
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_FAQ_ITEMS_LABEL="FAQ Items (JSON)"
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_FAQ_ITEMS_DESC="FAQ question-answer pairs for /llms.txt. Enter as a JSON array. Example: [{\"question\":\"Do you ship internationally?\",\"answer\":\"Yes, we ship to 50+ countries.\"},{\"question\":\"What is your return policy?\",\"answer\":\"30-day no-questions-asked returns.\"}]"
PLG_SYSTEM_AIBOOST_AEO_ENABLE_LLMS_FULL_LABEL="Enable llms-full.txt [Pro]"
PLG_SYSTEM_AIBOOST_AEO_ENABLE_LLMS_FULL_DESC="Generate /llms-full.txt with a structured index of all published articles, categories, and descriptions (up to 500 articles). AI engines use this to understand your full content library. Requires a Pro license."

