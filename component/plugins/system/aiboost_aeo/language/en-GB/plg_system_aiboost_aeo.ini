PLG_SYSTEM_AIBOOST_AEO_FIELDSET_LLMS_TXT="llms.txt — AI Content Index"
PLG_SYSTEM_AIBOOST_AEO_ENABLE_LLMS_TXT_LABEL="Enable llms.txt"
PLG_SYSTEM_AIBOOST_AEO_ENABLE_LLMS_TXT_DESC="Generate a /llms.txt file at your site root. This file tells AI engines (ChatGPT, Claude, Perplexity) what your site is about and where to find your content. Recommended: Yes."
