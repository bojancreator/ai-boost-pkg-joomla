PLG_SYSTEM_AIBOOST_SCHEMA_HOWTO_DESC_DESC="Brief description of what this guide accomplishes."
PLG_SYSTEM_AIBOOST_SCHEMA_HOWTO_TIME_LABEL="Total Time (ISO 8601)"
PLG_SYSTEM_AIBOOST_SCHEMA_HOWTO_TIME_DESC="Estimated total time to complete the guide. Use ISO 8601 duration format: PT15M = 15 minutes, PT1H = 1 hour, PT1H30M = 1 hour 30 minutes."

