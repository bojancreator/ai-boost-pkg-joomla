PLG_SYSTEM_AIBOOST_SCHEMA_ARTICLE_ENABLED_DESC="When enabled, adds Article / BlogPosting / NewsArticle JSON-LD on Joomla article pages. Includes headline, author, datePublished, dateModified, image, and publisher. The schema type can be overridden per-article using the Joomla custom field aiboost_schema_type."

