PLG_SYSTEM_AIBOOST_SCHEMA_HOWTO_ENABLED_DESC="Outputs a HowTo JSON-LD block on article pages. Active for AI engine citations (ChatGPT, Perplexity) for step-by-step content. Only rendered on com_content article pages."
