PLG_SYSTEM_AIBOOST_SEO="AI Boost — SEO"
PLG_SYSTEM_AIBOOST_SEO_XML_DESCRIPTION="Manages page titles, canonical URLs, meta robots, hreflang, and per-page SEO overrides for maximum search engine visibility. Part of the AI Boost for Joomla package."

; ── License ──────────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SEO_FIELDSET_LICENSE="License"
PLG_SYSTEM_AIBOOST_SEO_LICENSE_KEY_LABEL="License Key"
PLG_SYSTEM_AIBOOST_SEO_LICENSE_KEY_DESC="Enter your AI Boost license key to activate Pro features (per-article overrides, hreflang, advanced tokens, redirects). Get your key at aiboostnow.com. Leave blank to use the Free tier."
PLG_SYSTEM_AIBOOST_SEO_LICENSE_STATUS_LABEL="License Status"
PLG_SYSTEM_AIBOOST_SEO_LICENSE_STATUS_DESC="Shows your current tier (Free or Professional). Updated automatically when you save a valid license key."

; ── Title ─────────────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SEO_FIELDSET_TITLE="Page Title"
PLG_SYSTEM_AIBOOST_SEO_TITLE_TEMPLATE_LABEL="Title Template"
PLG_SYSTEM_AIBOOST_SEO_TITLE_TEMPLATE_DESC="Template for the browser tab and search result title. Available tokens: {page_title} (Joomla page title), {site_name} (your site name). Pro tokens: {category}, {author}, {year}, {page_num}."
PLG_SYSTEM_AIBOOST_SEO_TITLE_SEPARATOR_LABEL="Title Separator"
PLG_SYSTEM_AIBOOST_SEO_TITLE_SEPARATOR_DESC="Character used to separate sections of the title when using the simple prefix/suffix mode instead of a full template."
PLG_SYSTEM_AIBOOST_SEO_TITLE_POSITION_LABEL="Site Name Position"
PLG_SYSTEM_AIBOOST_SEO_TITLE_POSITION_DESC="Position of the site name relative to the page title. Prefix: Site Name | Page Title. Suffix: Page Title | Site Name. Only applies when using the simple template ({page_title} | {site_name})."
PLG_SYSTEM_AIBOOST_SEO_TITLE_POSITION_PREFIX="Prefix (before page title)"
PLG_SYSTEM_AIBOOST_SEO_TITLE_POSITION_SUFFIX="Suffix (after page title)"

; Pro: per-view templates
PLG_SYSTEM_AIBOOST_SEO_TITLE_HOMEPAGE_LABEL="Homepage Title Template (Pro)"
PLG_SYSTEM_AIBOOST_SEO_TITLE_HOMEPAGE_DESC="Custom title template for the homepage. Overrides the global template. Leave blank to use the global template. Tokens: {site_name}, {year}."
PLG_SYSTEM_AIBOOST_SEO_TITLE_ARTICLE_LABEL="Article Title Template (Pro)"
PLG_SYSTEM_AIBOOST_SEO_TITLE_ARTICLE_DESC="Custom title template for single article pages. Tokens: {page_title}, {site_name}, {category}, {author}, {year}."
PLG_SYSTEM_AIBOOST_SEO_TITLE_CATEGORY_LABEL="Category Title Template (Pro)"
PLG_SYSTEM_AIBOOST_SEO_TITLE_CATEGORY_DESC="Custom title template for category and blog views. Tokens: {page_title}, {site_name}, {page_num}."
PLG_SYSTEM_AIBOOST_SEO_TITLE_TAG_LABEL="Tag Title Template (Pro)"
PLG_SYSTEM_AIBOOST_SEO_TITLE_TAG_DESC="Custom title template for tag archive pages. Tokens: {page_title}, {site_name}, {page_num}."

; ── Meta ─────────────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SEO_FIELDSET_META="Meta Description & Robots"
PLG_SYSTEM_AIBOOST_SEO_DEFAULT_META_DESC_LABEL="Default Meta Description"
PLG_SYSTEM_AIBOOST_SEO_DEFAULT_META_DESC_DESC="Fallback meta description used when a page has no description set in Joomla. Keep under 160 characters. Pro: override per-article with the aiboost_seo_description custom field."
PLG_SYSTEM_AIBOOST_SEO_DEFAULT_ROBOTS_LABEL="Global Robots Directive"
PLG_SYSTEM_AIBOOST_SEO_DEFAULT_ROBOTS_DESC="The robots meta tag applied to every page by default. Use 'index, follow' for normal pages. Override per menu item with the noindex list below."
PLG_SYSTEM_AIBOOST_SEO_NOINDEX_MENU_ITEMS_LABEL="Noindex Menu Items"
PLG_SYSTEM_AIBOOST_SEO_NOINDEX_MENU_ITEMS_DESC="Comma-separated list of Joomla menu item IDs that should receive a 'noindex, follow' robots directive. Example: 42, 87, 103. Find menu item IDs in Menus → Edit Menu Item (check the URL for Itemid=...)."

; ── Canonical ─────────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SEO_FIELDSET_CANONICAL="Canonical URL"
PLG_SYSTEM_AIBOOST_SEO_CANONICAL_ENABLE_LABEL="Enable Canonical Tags"
PLG_SYSTEM_AIBOOST_SEO_CANONICAL_ENABLE_DESC="Adds a self-referencing <link rel=\"canonical\"> tag to every HTML page. Strongly recommended — prevents duplicate content issues from query strings and URL variations."
PLG_SYSTEM_AIBOOST_SEO_STRIP_QUERY_STRINGS_LABEL="Strip Tracking Parameters"
PLG_SYSTEM_AIBOOST_SEO_STRIP_QUERY_STRINGS_DESC="Remove UTM parameters (utm_source, utm_medium, etc.), fbclid, gclid, and other tracking parameters from the canonical URL. Recommended: Yes."
PLG_SYSTEM_AIBOOST_SEO_PAGINATION_CANONICAL_LABEL="Pagination Prev/Next (Pro)"
PLG_SYSTEM_AIBOOST_SEO_PAGINATION_CANONICAL_DESC="On paginated category and blog views, inject <link rel=\"prev\"> and <link rel=\"next\"> tags in addition to the canonical. Helps search engines understand the content series. Pro feature."

; ── Hreflang ─────────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SEO_FIELDSET_HREFLANG="Hreflang (Multilingual) — Pro"
PLG_SYSTEM_AIBOOST_SEO_HREFLANG_ENABLE_LABEL="Enable Hreflang Tags (Pro)"
PLG_SYSTEM_AIBOOST_SEO_HREFLANG_ENABLE_DESC="Automatically inject <link rel=\"alternate\" hreflang=\"...\"> tags for multilingual sites. Reads language associations from Joomla's #__associations table. Requires Joomla multilingual system and associated content. Pro feature."
PLG_SYSTEM_AIBOOST_SEO_HREFLANG_XDEFAULT_LABEL="x-default Language (Pro)"
PLG_SYSTEM_AIBOOST_SEO_HREFLANG_XDEFAULT_DESC="The language tag used for the hreflang x-default link, which tells search engines which version to show when no language preference matches. Use BCP 47 format, e.g. en-GB."

; ── Redirects ─────────────────────────────────────────────────────────────────
PLG_SYSTEM_AIBOOST_SEO_FIELDSET_REDIRECTS="Redirect Manager — Pro"
PLG_SYSTEM_AIBOOST_SEO_REDIRECTS_ENABLE_LABEL="Enable Redirect Manager (Pro)"
PLG_SYSTEM_AIBOOST_SEO_REDIRECTS_ENABLE_DESC="Process the redirect rules below on every request. Applied before any page output so headers are sent correctly. Pro feature."
PLG_SYSTEM_AIBOOST_SEO_REDIRECT_RULES_LABEL="Redirect Rules"
PLG_SYSTEM_AIBOOST_SEO_REDIRECT_RULES_DESC="Define 301 or 302 redirects. Source Path: the URL path to match (e.g. /old-page). Destination URL: where to redirect (e.g. /new-page or https://example.com/new-page). Matched against the request path only (no query string)."
PLG_SYSTEM_AIBOOST_SEO_REDIRECT_SOURCE_LABEL="Source Path"
PLG_SYSTEM_AIBOOST_SEO_REDIRECT_SOURCE_DESC="The URL path to redirect from. Must start with /. Example: /old-about-us"
PLG_SYSTEM_AIBOOST_SEO_REDIRECT_DEST_LABEL="Destination URL"
PLG_SYSTEM_AIBOOST_SEO_REDIRECT_DEST_DESC="Where to redirect. Can be a path (/new-about) or a full URL (https://example.com/new-about)."
PLG_SYSTEM_AIBOOST_SEO_REDIRECT_TYPE_LABEL="Redirect Type"
PLG_SYSTEM_AIBOOST_SEO_REDIRECT_TYPE_DESC="301 Permanent: the old URL is gone forever (search engines transfer link equity). 302 Temporary: the old URL still exists (search engines keep both indexed)."
