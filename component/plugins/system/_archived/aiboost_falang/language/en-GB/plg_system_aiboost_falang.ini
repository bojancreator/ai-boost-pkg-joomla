PLG_SYSTEM_AIBOOST_FALANG="AI Boost for Falang Pro"
PLG_SYSTEM_AIBOOST_FALANG_XML_DESCRIPTION="AI Boost add-on: automatic hreflang tags from Falang Pro language data, per-language Schema.org organisation fields, and per-language OpenGraph meta. Requires AI Boost for Joomla (Basic or Professional license) and Falang Pro."

PLG_SYSTEM_AIBOOST_FALANG_FIELDSET_BASIC="Falang Pro Settings"

PLG_SYSTEM_AIBOOST_FALANG_HREFLANG_ENABLED_LABEL="Auto hreflang from Falang"
PLG_SYSTEM_AIBOOST_FALANG_HREFLANG_ENABLED_DESC="Automatically generate <link rel='alternate' hreflang='xx'> tags for all active Falang languages. Reads language SEF codes from the Falang language database."

PLG_SYSTEM_AIBOOST_FALANG_SCHEMA_TRANSLATE_LABEL="Per-language Schema.org"
PLG_SYSTEM_AIBOOST_FALANG_SCHEMA_TRANSLATE_DESC="Serve Organisation name and description in the visitor's active Falang language instead of the default English values."

PLG_SYSTEM_AIBOOST_FALANG_OG_TRANSLATE_LABEL="Per-language OpenGraph"
PLG_SYSTEM_AIBOOST_FALANG_OG_TRANSLATE_DESC="Override og:site_name and og:description with Falang-translated values for the current visitor language."

PLG_SYSTEM_AIBOOST_FALANG_PRIMARY_LANG_LABEL="Primary Language (x-default)"
PLG_SYSTEM_AIBOOST_FALANG_PRIMARY_LANG_DESC="Language SEF code used for the x-default hreflang tag (e.g. 'en'). This is typically your site's main language."

PLG_SYSTEM_AIBOOST_FALANG_FALLBACK_LANG_LABEL="Fallback Language"
PLG_SYSTEM_AIBOOST_FALANG_FALLBACK_LANG_DESC="SEF code of the language to fall back to when a Falang translation is missing (e.g. 'en')."
