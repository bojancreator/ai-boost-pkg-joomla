PLG_SYSTEM_AIBOOST_SOCIAL="AI Boost — OpenGraph"
PLG_SYSTEM_AIBOOST_SOCIAL_XML_DESCRIPTION="Adds OpenGraph and Twitter Card meta tags to every page for rich social media previews. Free: global tags. Pro: per-article overrides via custom fields, intro image, article:* timing tags, og:locale, fb:app_id."
PLG_SYSTEM_AIBOOST_SOCIAL_YES="Yes"
PLG_SYSTEM_AIBOOST_SOCIAL_NO="No"
PLG_SYSTEM_AIBOOST_SOCIAL_FIELDSET_LICENSE="License"
PLG_SYSTEM_AIBOOST_SOCIAL_LICENSE_KEY_LABEL="License Key"
PLG_SYSTEM_AIBOOST_SOCIAL_LICENSE_KEY_DESC="Enter your AI Boost license key to activate Pro features. Get your key at aiboostnow.com. Leave blank to use the Free tier."
PLG_SYSTEM_AIBOOST_SOCIAL_LICENSE_STATUS_LABEL="License Status"
PLG_SYSTEM_AIBOOST_SOCIAL_LICENSE_STATUS_DESC="Shows your current tier (Free or Professional). Updated automatically when you save a valid license key."
PLG_SYSTEM_AIBOOST_SOCIAL_FIELDSET_OG_GLOBAL="OpenGraph — Global Settings"
PLG_SYSTEM_AIBOOST_SOCIAL_SITE_NAME_LABEL="Site Name"
PLG_SYSTEM_AIBOOST_SOCIAL_SITE_NAME_DESC="The og:site_name value shown in social previews. Leave blank to use your Joomla site name automatically."
PLG_SYSTEM_AIBOOST_SOCIAL_DEFAULT_IMAGE_LABEL="Default OG Image URL"
PLG_SYSTEM_AIBOOST_SOCIAL_DEFAULT_IMAGE_DESC="Absolute URL of the fallback image for og:image and twitter:image. Recommended size: 1200x630 px."
PLG_SYSTEM_AIBOOST_SOCIAL_TWITTER_CARDS_LABEL="Enable Twitter Cards"
PLG_SYSTEM_AIBOOST_SOCIAL_TWITTER_CARDS_DESC="When enabled, adds twitter:card, twitter:title, twitter:description, and twitter:image meta tags to every page."
PLG_SYSTEM_AIBOOST_SOCIAL_FIELDSET_OG_PRO="OpenGraph — Pro Settings [Pro]"
PLG_SYSTEM_AIBOOST_SOCIAL_PER_ARTICLE_FIELDS_LABEL="Enable Per-Article Custom Field Overrides"
PLG_SYSTEM_AIBOOST_SOCIAL_PER_ARTICLE_FIELDS_DESC="When enabled, reads custom fields aiboost_og_title, aiboost_og_description, aiboost_og_image on article pages. Falang translations applied automatically."
PLG_SYSTEM_AIBOOST_SOCIAL_ARTICLE_OG_TYPE_LABEL="Use og:type=article on Article Pages"
PLG_SYSTEM_AIBOOST_SOCIAL_ARTICLE_OG_TYPE_DESC="Article pages get og:type=article with article:published_time, article:modified_time, article:author, article:section tags."
PLG_SYSTEM_AIBOOST_SOCIAL_OG_LOCALE_LABEL="Auto-set og:locale"
PLG_SYSTEM_AIBOOST_SOCIAL_OG_LOCALE_DESC="Automatically adds og:locale based on the active Joomla language (e.g. en-GB becomes en_US, de-DE becomes de_DE)."
PLG_SYSTEM_AIBOOST_SOCIAL_FB_APP_ID_LABEL="Facebook App ID"
PLG_SYSTEM_AIBOOST_SOCIAL_FB_APP_ID_DESC="Your Facebook App ID. Adds a fb:app_id meta tag when set."
PLG_SYSTEM_AIBOOST_SOCIAL_TWITTER_HANDLE_LABEL="Twitter / X Site Handle"
PLG_SYSTEM_AIBOOST_SOCIAL_TWITTER_HANDLE_DESC="Your Twitter / X account handle (e.g. @aiboostnow). Adds twitter:site meta tag."
PLG_SYSTEM_AIBOOST_SOCIAL_IMAGE_WIDTH_LABEL="Default OG Image Width (px)"
PLG_SYSTEM_AIBOOST_SOCIAL_IMAGE_WIDTH_DESC="Width in pixels used for og:image:width. For local images, the actual width is auto-detected. Used as fallback for external URLs. Facebook recommends 1200 px."
PLG_SYSTEM_AIBOOST_SOCIAL_IMAGE_HEIGHT_LABEL="Default OG Image Height (px)"
PLG_SYSTEM_AIBOOST_SOCIAL_IMAGE_HEIGHT_DESC="Height in pixels used for og:image:height. For local images, the actual height is auto-detected. Used as fallback for external URLs. Facebook recommends 630 px."
