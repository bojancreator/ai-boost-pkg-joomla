PLG_PWEBOPENGRAPH_TWITTER_REQUIREMENTS_SUMMARY = "<div class=\"alert alert-info\"><b>Twitter Image Requirements for Summary Cards:</b><ul><li>Images for this card support an aspect ratio of 1:1 with minimum dimensions of 144x144 or maximum of4096x4096 pixels.</li><li>Images must be less than 5MB in size. The image will be cropped to a square on all platforms.</li><li>JPG, PNG, WEBP and GIF formats are supported. SVG is not supported.</li><li>Only the first frame of an animated GIF will be used.</li></ul></div>"
PLG_PWEBOPENGRAPH_TWITTER_REQUIREMENTS_SUMMARY_LARGE_IMAGE = "<div class=\"alert alert-info\"><b>Twitter Image Requirements for Summary with Large Image Cards:</b><ul><li>Images for this card support an aspect ratio of 2:1 with minimum dimensions of 300x157 or maximum of 4096x4096pixels.</li><li>Images must be less than 5MB in size.</li><li>JPG, PNG, WEBP and GIF formats are supported. SVG is not supported.</li><li>Only the first frame of an animated GIF will be used.</li></ul></div>"
