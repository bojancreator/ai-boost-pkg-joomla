PLG_PWEBOPENGRAPH_FACEBOOK_REQUIREMENTS = "<div class=\"alert alert-info\"><b>Facebook Image Requirements:</b><ul><li>The minimum allowed image dimension is 200 x 200 pixels.</li><li>The size of the image file must not exceed 8 MB.</li><li>Use images that are at least 1200 x 630 pixels for the best display on high resolution devices. At the minimum,you</li><li>should use images that are 600 x 315 pixels to display link page posts with larger images.</li><li>If your image is smaller than 600 x 315 px, it will still display in the link page post, but the size will bemuchsmaller.</li><li>the aspect ratio for images is the same across desktop and mobile News Feed. Try to keep your images as close to1.91:1 aspect ratio as possible to display the full image in News Feed without any cropping.</li><li>The Facebook crawler only accepts gzip and deflate encodings, so make sure your server uses the right encoding.</li></ul></div>"

