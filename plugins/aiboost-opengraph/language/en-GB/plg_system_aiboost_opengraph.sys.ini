PLG_SYSTEM_AIBOOST_OPENGRAPH_XML_DESCRIPTION="Injects Open Graph meta tags (og:title, og:description, og:image, og:type) and Twitter/X Cards on every page. Per-article and per-category overrides via Joomla custom fields. Falang Pro integration for translated OG tags. Also injects &lt;link rel='alternate' hreflang&gt; tags for all active Joomla languages (hreflang functionality merged from standalone Hreflang plugin). Standalone — no dependencies."
