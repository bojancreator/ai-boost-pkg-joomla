; AI Boost — OpenGraph + Hreflang — Plugin Parameters
PLG_SYSTEM_AIBOOST_OPENGRAPH="AI Boost — OpenGraph"

; Fieldsets
PLG_SYSTEM_AIBOOST_OPENGRAPH_FIELDSET_BASIC="OpenGraph Settings"
PLG_SYSTEM_AIBOOST_OPENGRAPH_FIELDSET_TWITTER="Twitter / X Cards"
PLG_SYSTEM_AIBOOST_OPENGRAPH_FIELDSET_MULTILINGUAL="Multilingual (Falang)"
PLG_SYSTEM_AIBOOST_OPENGRAPH_FIELDSET_HREFLANG="Hreflang Link Tags"

; Basic
PLG_SYSTEM_AIBOOST_OPENGRAPH_SITE_NAME_LABEL="Site Name"
PLG_SYSTEM_AIBOOST_OPENGRAPH_SITE_NAME_DESC="Value for the og:site_name meta tag — the name of your website as shown in social sharing previews (e.g. Acme Blog). Leave empty to use the Joomla site name automatically."
PLG_SYSTEM_AIBOOST_OPENGRAPH_DEFAULT_IMAGE_LABEL="Default OG Image"
PLG_SYSTEM_AIBOOST_OPENGRAPH_DEFAULT_IMAGE_DESC="Fallback image used for og:image when no article-specific image is found. Recommended size: 1200&times;630 px, max 8 MB. Used when sharing your homepage, category pages, or articles without images."
PLG_SYSTEM_AIBOOST_OPENGRAPH_TYPE_LABEL="Default OG Type"
PLG_SYSTEM_AIBOOST_OPENGRAPH_TYPE_DESC="The og:type value for non-article pages. Article pages always use &lsquo;article&rsquo; automatically."
PLG_SYSTEM_AIBOOST_OPENGRAPH_TYPE_WEBSITE="website"
PLG_SYSTEM_AIBOOST_OPENGRAPH_TYPE_BLOG="blog"

; Twitter / X Cards
PLG_SYSTEM_AIBOOST_OPENGRAPH_TWITTER_ENABLED_LABEL="Enable Twitter/X Cards"
PLG_SYSTEM_AIBOOST_OPENGRAPH_TWITTER_ENABLED_DESC="Inject Twitter/X Card meta tags (twitter:card, twitter:title, twitter:description, twitter:image). These control the preview shown when your pages are shared on Twitter/X. Note: Twitter/X Cards also read og: tags, so OpenGraph must be enabled above."
PLG_SYSTEM_AIBOOST_OPENGRAPH_TWITTER_CARD_LABEL="Card Type"
PLG_SYSTEM_AIBOOST_OPENGRAPH_TWITTER_CARD_DESC="summary = small square thumbnail left of the text. summary_large_image = large image above the text (recommended for content-rich sites)."
PLG_SYSTEM_AIBOOST_OPENGRAPH_TWITTER_SITE_LABEL="Twitter/X Username"
PLG_SYSTEM_AIBOOST_OPENGRAPH_TWITTER_SITE_DESC="Your Twitter/X handle without the @ symbol (e.g. acmecorp). Added as the twitter:site tag, linking the card to your account. Leave empty to omit the tag."

; Multilingual
PLG_SYSTEM_AIBOOST_OPENGRAPH_FALANG_LABEL="Falang Pro Integration"
PLG_SYSTEM_AIBOOST_OPENGRAPH_FALANG_DESC="When enabled, the plugin reads Falang-translated title and description for og:title and og:description on non-default-language pages. Requires Falang Pro to be installed and configured."

; Hreflang
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_ENABLED_LABEL="Enable Hreflang Link Tags"
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_ENABLED_DESC="Inject &lt;link rel=&ldquo;alternate&rdquo; hreflang=&ldquo;xx&rdquo;&gt; tags for every active Joomla language on every page. These tags tell Google which language version to show to which users and prevent duplicate content issues. Also adds a canonical link for the current language version."
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_DETECT_LABEL="Language Detection"
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_DETECT_DESC="Auto: reads active languages from the Joomla database (#__languages table) — works for standard Joomla multilingual setups. Manual: use the JSON field below to define languages manually — needed for custom setups or non-standard SEF prefix configurations."
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_DETECT_AUTO="Auto-detect (Joomla languages)"
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_DETECT_MANUAL="Manual (JSON)"
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_PRIMARY_LABEL="Primary Language SEF Prefix"
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_PRIMARY_DESC="The SEF (search engine friendly) URL prefix of your primary language as configured in Joomla &rarr; System &rarr; Languages. Example: if English is at /en/... enter en. If your primary language has no prefix (default language with hidden prefix), leave empty."
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_XDEFAULT_LABEL="x-default URL (optional)"
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_XDEFAULT_DESC="Override the URL used for the &lt;link hreflang=&ldquo;x-default&rdquo;&gt; tag. This should point to a language-selection page or your site root if no language is selected. Leave empty to use the primary language URL automatically."
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_MANUAL_LABEL="Manual Language List (JSON)"
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_MANUAL_DESC="Used only when detection is set to Manual. Define each language as a JSON array. Required keys: lang_code (IETF format, e.g. en-GB), sef (URL prefix, e.g. en), title (display name). Example:&#10;[{&ldquo;lang_code&rdquo;:&ldquo;en-GB&rdquo;,&ldquo;sef&rdquo;:&ldquo;en&rdquo;,&ldquo;title&rdquo;:&ldquo;English&rdquo;},{&ldquo;lang_code&rdquo;:&ldquo;de-DE&rdquo;,&ldquo;sef&rdquo;:&ldquo;de&rdquo;,&ldquo;title&rdquo;:&ldquo;Deutsch&rdquo;}]"
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_FALANG_LABEL="Use Falang Alias Map"
PLG_SYSTEM_AIBOOST_OPENGRAPH_HREFLANG_FALANG_DESC="When enabled, the plugin queries the Falang database to retrieve the translated article alias for each language, producing accurate per-language URLs in hreflang tags instead of generic language-prefixed URLs. Requires Falang Pro."

; Advanced
PLG_SYSTEM_AIBOOST_OPENGRAPH_STAGING_LABEL="Staging Mode"
PLG_SYSTEM_AIBOOST_OPENGRAPH_STAGING_DESC="Enable on staging or development servers to suppress all OG, Twitter Card, and hreflang output. Prevents test pages from polluting social caches or search engine signals."
