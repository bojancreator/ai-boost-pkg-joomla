; Fieldsets
PLG_SYSTEM_AIBOOST_HREFLANG_FIELDSET_BASIC="Hreflang Settings"
PLG_SYSTEM_AIBOOST_HREFLANG_FIELDSET_FALANG="Falang Pro Integration"

; Basic
PLG_SYSTEM_AIBOOST_HREFLANG_PRIMARY_LANG_LABEL="Primary Language SEF"
PLG_SYSTEM_AIBOOST_HREFLANG_PRIMARY_LANG_DESC="SEF code of your primary language (e.g. en). Used for the x-default hreflang tag."
PLG_SYSTEM_AIBOOST_HREFLANG_XDEFAULT_LABEL="x-default URL"
PLG_SYSTEM_AIBOOST_HREFLANG_XDEFAULT_DESC="Custom URL for the x-default hreflang tag. Leave empty to use the primary language URL."
PLG_SYSTEM_AIBOOST_HREFLANG_DETECTION_LABEL="Language Detection"
PLG_SYSTEM_AIBOOST_HREFLANG_DETECTION_DESC="Auto: reads active languages from Joomla language manager. Manual: use the JSON list below."
PLG_SYSTEM_AIBOOST_HREFLANG_DETECTION_AUTO="Auto (Joomla languages)"
PLG_SYSTEM_AIBOOST_HREFLANG_DETECTION_MANUAL="Manual (JSON list)"
PLG_SYSTEM_AIBOOST_HREFLANG_MANUAL_LANGS_LABEL="Manual Language List (JSON)"
PLG_SYSTEM_AIBOOST_HREFLANG_MANUAL_LANGS_DESC="JSON array of language objects. Each object needs lang_code (IETF tag), sef (URL prefix), and title. Example: [{\"lang_code\":\"en-GB\",\"sef\":\"en\",\"title\":\"English\"}]"

; Falang
PLG_SYSTEM_AIBOOST_HREFLANG_FALANG_LABEL="Enable Falang Pro Integration"
PLG_SYSTEM_AIBOOST_HREFLANG_FALANG_DESC="When enabled, queries Falang Pro translated aliases to generate accurate per-language hreflang URLs (e.g. /sr/o-nama instead of /sr/about-us). Silently skipped if Falang is not installed."

; Advanced
PLG_SYSTEM_AIBOOST_HREFLANG_STAGING_LABEL="Staging Mode"
PLG_SYSTEM_AIBOOST_HREFLANG_STAGING_DESC="Enable on staging/dev servers to suppress all hreflang output."
