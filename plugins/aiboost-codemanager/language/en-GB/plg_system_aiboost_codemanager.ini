; AI Boost — Code Manager — Plugin Parameters
PLG_SYSTEM_AIBOOST_CODEMANAGER="AI Boost — Code Manager"

; Fieldsets
PLG_SYSTEM_AIBOOST_CODEMANAGER_FIELDSET_ANALYTICS="Analytics & Tracking"
PLG_SYSTEM_AIBOOST_CODEMANAGER_FIELDSET_VERIFICATION="Site Verification"
PLG_SYSTEM_AIBOOST_CODEMANAGER_FIELDSET_CUSTOM="Custom Code"

; GA4
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_ENABLED_LABEL="Enable Google Analytics 4"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_ENABLED_DESC="Inject the official GA4 gtag.js tracking snippet on every page. Requires a GA4 Measurement ID below."
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_ID_LABEL="GA4 Measurement ID"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_ID_DESC="Found in Google Analytics &rarr; Admin &rarr; Property &rarr; Data Streams &rarr; click your stream &rarr; Measurement ID. Format: G-XXXXXXXXXX (e.g. G-ABC123DEF4)."
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_CONSENT_LABEL="GA4 Consent Mode"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_CONSENT_DESC="Controls how GA4 behaves in relation to cookie consent. &ldquo;None&rdquo; = fire immediately (no GDPR consent management). &ldquo;YooTheme Pro&rdquo; = delay tracking until the YooTheme Consent Manager is accepted. &ldquo;Via GTM&rdquo; = skip direct GA4 injection; your GTM container must contain a GA4 Configuration tag. &ldquo;Default Denied&rdquo; = inject with consent denied by default; your CMP must call gtag(&lsquo;consent&rsquo;, &lsquo;update&rsquo;, ...) to grant consent."
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_CONSENT_NONE="None (fire immediately)"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_CONSENT_YOOTHEME="YooTheme Pro Consent Manager"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_CONSENT_GTM="Via GTM (skip direct inject)"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_CONSENT_DEFAULT_DENIED="Default Denied (custom CMP)"

; GTM
PLG_SYSTEM_AIBOOST_CODEMANAGER_GTM_ENABLED_LABEL="Enable Google Tag Manager"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GTM_ENABLED_DESC="Inject the official GTM snippet in &lt;head&gt; and a &lt;noscript&gt; fallback immediately after &lt;body&gt;. Use GTM when you manage multiple tracking scripts from the Tag Manager interface."
PLG_SYSTEM_AIBOOST_CODEMANAGER_GTM_ID_LABEL="GTM Container ID"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GTM_ID_DESC="Found in Google Tag Manager &rarr; click your container name at the top of the workspace. Format: GTM-XXXXXXX (e.g. GTM-AB12CD3)."

; Meta Pixel
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_ENABLED_LABEL="Enable Meta (Facebook) Pixel"
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_ENABLED_DESC="Inject the official Meta Pixel base code to track visitors and conversions for Facebook/Instagram ads."
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_IDS_LABEL="Meta Pixel ID(s)"
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_IDS_DESC="One or more Meta Pixel IDs, one per line. Found in Meta Events Manager &rarr; Data Sources &rarr; select your Pixel &rarr; the numeric ID is shown at the top (e.g. 1234567890123). Multiple IDs are useful when you have separate pixels for different ad accounts or tracking scenarios — each receives a PageView event."
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_CONSENT_LABEL="Meta Pixel Consent Mode"
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_CONSENT_DESC="Controls whether Meta Pixel fires freely or waits for user consent. &ldquo;Auto&rdquo; = fire immediately on every page load (default). &ldquo;Consent Required&rdquo; = call fbq(&lsquo;consent&rsquo;, &lsquo;revoke&rsquo;) first; your CMP must later call fbq(&lsquo;consent&rsquo;, &lsquo;grant&rsquo;) to activate tracking."
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_CONSENT_AUTO="Auto (fire immediately)"
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_CONSENT_REQUIRED="Consent Required (revoke until granted)"
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_STD_EVENTS_LABEL="Standard Events"
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_STD_EVENTS_DESC="Select which standard Meta Pixel events to fire on every page. PageView is the baseline event tracked automatically. Additional events such as ViewContent, Lead, or Purchase are useful for conversion tracking and retargeting audiences."
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_CUSTOM_EVENTS_LABEL="Custom Events (JSON)"
PLG_SYSTEM_AIBOOST_CODEMANAGER_PIXEL_CUSTOM_EVENTS_DESC="Fire custom Meta Pixel events based on URL matching. Enter a JSON array of objects, each with a &ldquo;name&rdquo; (required) and optional &ldquo;url&rdquo; substring to match. Example: [{&ldquo;name&rdquo;:&ldquo;Purchase&rdquo;,&ldquo;url&rdquo;:&ldquo;/thank-you&rdquo;},{&ldquo;name&rdquo;:&ldquo;Lead&rdquo;,&ldquo;url&rdquo;:&ldquo;/contact-success&rdquo;}]. Leave url empty to fire on every page."

; Verification — Google Search Console
PLG_SYSTEM_AIBOOST_CODEMANAGER_GSC_LABEL="Google Search Console"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GSC_DESC="One or more Google Site Verification codes, one per line. To get the code: Google Search Console &rarr; Add Property &rarr; choose &ldquo;HTML tag&rdquo; method &rarr; copy only the content=&ldquo;...&rdquo; value (e.g. ABC123xyz456). Multiple codes are needed when you have more than one Search Console property (e.g. www + non-www versions, or multiple owners)."
PLG_SYSTEM_AIBOOST_CODEMANAGER_GSC_HTML_LABEL="GSC Additional HTML"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GSC_HTML_DESC="Paste any additional raw HTML that Google Search Console instructs you to add to &lt;head&gt; — for example, the full content of a google-site-verification HTML file (&lt;meta name=&ldquo;google-site-verification&rdquo; content=&ldquo;...&rdquo;&gt;) or any other verification snippet. Injected as-is, without escaping."

; Verification — Bing
PLG_SYSTEM_AIBOOST_CODEMANAGER_BING_LABEL="Bing Webmaster Tools"
PLG_SYSTEM_AIBOOST_CODEMANAGER_BING_DESC="Bing Webmaster verification code. In Bing Webmaster Tools &rarr; Add a site &rarr; choose &ldquo;Meta Tag&rdquo; method &rarr; copy only the content=&ldquo;...&rdquo; value (e.g. 1A2B3C4D5E6F). Injects &lt;meta name=&ldquo;msvalidate.01&rdquo;&gt;."

; Verification — Yandex
PLG_SYSTEM_AIBOOST_CODEMANAGER_YANDEX_LABEL="Yandex Webmaster"
PLG_SYSTEM_AIBOOST_CODEMANAGER_YANDEX_DESC="Yandex Webmaster verification code. In Yandex Webmaster &rarr; Add site &rarr; choose &ldquo;Meta Tag&rdquo; &rarr; copy only the content=&ldquo;...&rdquo; value. Injects &lt;meta name=&ldquo;yandex-verification&rdquo;&gt;."

; Verification — Pinterest
PLG_SYSTEM_AIBOOST_CODEMANAGER_PINTEREST_LABEL="Pinterest"
PLG_SYSTEM_AIBOOST_CODEMANAGER_PINTEREST_DESC="Pinterest domain verification code. In Pinterest &rarr; Settings &rarr; Claim &rarr; claim your website &rarr; choose &ldquo;Add HTML tag&rdquo; &rarr; copy only the content=&ldquo;...&rdquo; value. Injects &lt;meta name=&ldquo;p:domain_verify&rdquo;&gt;."

; Verification — Norton
PLG_SYSTEM_AIBOOST_CODEMANAGER_NORTON_LABEL="Norton Safe Web"
PLG_SYSTEM_AIBOOST_CODEMANAGER_NORTON_DESC="Norton Safe Web site verification code. Get the code from Norton Safe Web &rarr; Verify your site. Injects &lt;meta name=&ldquo;norton-safeweb-site-verification&rdquo;&gt;."

; Verification — Facebook Domain
PLG_SYSTEM_AIBOOST_CODEMANAGER_FB_VERIFY_LABEL="Facebook Domain Verification"
PLG_SYSTEM_AIBOOST_CODEMANAGER_FB_VERIFY_DESC="Facebook domain verification code. In Meta Business Manager &rarr; Business Settings &rarr; Brand Safety &rarr; Domains &rarr; Add &rarr; choose &ldquo;Add a meta-tag to your website&rdquo; &rarr; copy only the content=&ldquo;...&rdquo; value (e.g. abc123xyz456789). Injects &lt;meta name=&ldquo;facebook-domain-verification&rdquo;&gt;."

; Custom Code
PLG_SYSTEM_AIBOOST_CODEMANAGER_HEAD_ENABLED_LABEL="Enable Custom &lt;head&gt; Code"
PLG_SYSTEM_AIBOOST_CODEMANAGER_HEAD_ENABLED_DESC="When enabled, the code below is injected inside &lt;head&gt; on every page."
PLG_SYSTEM_AIBOOST_CODEMANAGER_HEAD_CODE_LABEL="Custom &lt;head&gt; Code"
PLG_SYSTEM_AIBOOST_CODEMANAGER_HEAD_CODE_DESC="Paste any HTML/JavaScript that belongs inside &lt;head&gt; — e.g. third-party tag snippets, inline styles, or &lt;script src=...&gt; loaders. Full HTML tags accepted. Example: &lt;script src=&ldquo;https://example.com/widget.js&rdquo;&gt;&lt;/script&gt;"
PLG_SYSTEM_AIBOOST_CODEMANAGER_BODY_ENABLED_LABEL="Enable Custom &lt;body&gt; Code"
PLG_SYSTEM_AIBOOST_CODEMANAGER_BODY_ENABLED_DESC="When enabled, the code below is injected immediately after the opening &lt;body&gt; tag."
PLG_SYSTEM_AIBOOST_CODEMANAGER_BODY_CODE_LABEL="Custom &lt;body&gt; Code (after &lt;body&gt;)"
PLG_SYSTEM_AIBOOST_CODEMANAGER_BODY_CODE_DESC="Paste any code that must appear right after the opening &lt;body&gt; tag — e.g. noscript fallbacks, chat widget initialisation, or survey tool code. Full HTML tags accepted."
PLG_SYSTEM_AIBOOST_CODEMANAGER_FOOTER_ENABLED_LABEL="Enable Custom Footer Code"
PLG_SYSTEM_AIBOOST_CODEMANAGER_FOOTER_ENABLED_DESC="When enabled, the code below is injected just before the closing &lt;/body&gt; tag."
PLG_SYSTEM_AIBOOST_CODEMANAGER_FOOTER_CODE_LABEL="Custom Footer Code (before &lt;/body&gt;)"
PLG_SYSTEM_AIBOOST_CODEMANAGER_FOOTER_CODE_DESC="Paste any code that must load at the bottom of every page — e.g. live chat widgets, A/B testing scripts, cookie consent banners, or deferred third-party scripts. Full HTML tags accepted. Loading here is better for page speed than injecting in &lt;head&gt;."

; Advanced
PLG_SYSTEM_AIBOOST_CODEMANAGER_STAGING_LABEL="Staging Mode"
PLG_SYSTEM_AIBOOST_CODEMANAGER_STAGING_DESC="Enable this on staging or development servers to suppress all code injection. Prevents analytics data from being polluted with test traffic and stops verification codes from being served on non-production domains."

; Page load / Conditional loading
PLG_SYSTEM_AIBOOST_CODEMANAGER_FIELDSET_PAGELOAD="Script Loading"
PLG_SYSTEM_AIBOOST_CODEMANAGER_LOAD_PAGES_LABEL="Load On Pages"
PLG_SYSTEM_AIBOOST_CODEMANAGER_LOAD_PAGES_DESC="Choose which pages should receive analytics and custom code injection. &ldquo;All pages&rdquo; is the standard choice for most sites."
PLG_SYSTEM_AIBOOST_CODEMANAGER_LOAD_ALL="All pages (recommended)"
PLG_SYSTEM_AIBOOST_CODEMANAGER_LOAD_HOME="Homepage only"
PLG_SYSTEM_AIBOOST_CODEMANAGER_LOAD_NOTADMIN="All except admin"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_LOAD_LABEL="GA4 Script Loading"
PLG_SYSTEM_AIBOOST_CODEMANAGER_GA4_LOAD_DESC="Controls how the GA4 gtag.js script tag is loaded. async (default) = non-blocking, recommended. defer = waits until HTML is fully parsed. normal = blocks rendering until the script is downloaded (not recommended)."
PLG_SYSTEM_AIBOOST_CODEMANAGER_LOAD_NORMAL="normal (blocking)"
PLG_SYSTEM_AIBOOST_CODEMANAGER_CUSTOM_SCRIPT_LOAD_LABEL="Custom Script Loading"
PLG_SYSTEM_AIBOOST_CODEMANAGER_CUSTOM_SCRIPT_LOAD_DESC="Automatically apply async or defer attribute to all &lt;script src=...&gt; tags inside Custom Head Code. Useful if the third-party snippet you pasted does not include the attribute. Set to &ldquo;none&rdquo; to leave scripts unchanged."
PLG_SYSTEM_AIBOOST_CODEMANAGER_LOAD_NONE="none (keep as-is)"
