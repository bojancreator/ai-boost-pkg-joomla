PLG_SYSTEM_AIBOOST_SCHEMA_XML_DESCRIPTION="Injects Schema.org JSON-LD for 14 site types (Hotel, Restaurant, Medical, Lawyer, School, Gym, Dentist, Real Estate, Portfolio, News, and more). Features: Organization/LocalBusiness with per-type fields, advanced opening hours (simple + JSON schedule), seasonal hours, holiday closures, Article/BlogPosting, WebSite with Sitelinks Searchbox, FAQ (custom fields + manual JSON), Events, BreadcrumbList, and Hreflang XML Sitemap. Standalone — no dependencies."
