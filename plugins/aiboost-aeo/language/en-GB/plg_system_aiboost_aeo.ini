; AI Boost — AEO & AI Signals — Plugin Parameters
PLG_SYSTEM_AIBOOST_AEO="AI Boost — AEO & AI Signals"

; Fieldsets
PLG_SYSTEM_AIBOOST_AEO_FIELDSET_LLMSTXT="llms.txt / AI Index"
PLG_SYSTEM_AIBOOST_AEO_FIELDSET_INDEXNOW="IndexNow"
PLG_SYSTEM_AIBOOST_AEO_FIELDSET_ROBOTS="robots.txt & AI Crawlers"
PLG_SYSTEM_AIBOOST_AEO_FIELDSET_MARKDOWN="Markdown Pages"

; llms.txt
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_ENABLED_LABEL="Enable llms.txt"
PLG_SYSTEM_AIBOOST_AEO_LLMSTXT_ENABLED_DESC="Serves a machine-readable /llms.txt file at the root of your site. This is the emerging standard for telling AI agents (ChatGPT, Perplexity, Claude) what your site is about and which pages are most important. See llmstxt.org for the specification."
PLG_SYSTEM_AIBOOST_AEO_ORG_NAME_LABEL="Organisation Name"
PLG_SYSTEM_AIBOOST_AEO_ORG_NAME_DESC="Name of your website or organisation as it should appear in llms.txt (e.g. Acme Corporation). Leave empty to use the Joomla site name automatically."
PLG_SYSTEM_AIBOOST_AEO_ORG_DESC_LABEL="Organisation Description"
PLG_SYSTEM_AIBOOST_AEO_ORG_DESC_DESC="One or two sentences describing your site for AI agents. Be concise and factual — this text is read by AI models, not humans. Example: &ldquo;Acme Corporation sells industrial equipment to manufacturers across Europe. Established 1987, ISO-certified.&rdquo;"
PLG_SYSTEM_AIBOOST_AEO_ORG_URL_LABEL="Site URL"
PLG_SYSTEM_AIBOOST_AEO_ORG_URL_DESC="Your canonical site URL including protocol and without trailing slash (e.g. https://example.com). Used as the base URL for links in llms.txt and IndexNow. Leave empty to auto-detect from the current request."
PLG_SYSTEM_AIBOOST_AEO_CUSTOM_PAGES_LABEL="Custom Pages (Markdown links)"
PLG_SYSTEM_AIBOOST_AEO_CUSTOM_PAGES_DESC="List of important pages to highlight for AI agents, one per line in Markdown link format. Example:&#10;- [About Us](/about)&#10;- [Services](/services)&#10;- [Contact](/contact)&#10;These appear under the &ldquo;## Pages&rdquo; section in llms.txt."
PLG_SYSTEM_AIBOOST_AEO_LLMS_FULL_LABEL="Enable llms-full.txt"
PLG_SYSTEM_AIBOOST_AEO_LLMS_FULL_DESC="Serves /llms-full.txt — an extended index containing up to 200 published articles with their titles, URLs, and intro text excerpts. Useful for sites with a lot of content that want deep AI indexing. This file is linked from llms.txt automatically."

; IndexNow
PLG_SYSTEM_AIBOOST_AEO_INDEXNOW_KEY_LABEL="IndexNow API Key"
PLG_SYSTEM_AIBOOST_AEO_INDEXNOW_KEY_DESC="A unique alphanumeric key that proves ownership of your site to IndexNow-compatible search engines (Bing, Yandex, Seznam). Click &ldquo;Generate Key&rdquo; to create a new random key, then save the plugin. The plugin will automatically serve this key at /YOUR-KEY and /YOUR-KEY.txt so search engines can verify ownership. After saving, submit the key to Bing Webmaster Tools or use the Auto-submit option below."
PLG_SYSTEM_AIBOOST_AEO_INDEXNOW_AUTO_LABEL="Auto-submit on Publish"
PLG_SYSTEM_AIBOOST_AEO_INDEXNOW_AUTO_DESC="When enabled, the plugin automatically pings the IndexNow API (api.indexnow.org) whenever a Joomla article is published or its state changes to published. This notifies Bing, Yandex, and other IndexNow partners instantly — no need to wait for their regular crawl. Requires a valid API key above and cURL on your server."

; robots.txt
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_ENABLED_LABEL="Enable robots.txt"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_ENABLED_DESC="Serves a dynamic /robots.txt file generated by this plugin. IMPORTANT: if you have a physical robots.txt file on your server, delete it first — the physical file takes priority over this virtual one in most Joomla configurations."
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_AI_MODE_LABEL="AI Crawler Access"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_AI_MODE_DESC="Controls which AI crawlers are allowed to index your site via robots.txt. &ldquo;Allow all&rdquo; is recommended if you want to appear in AI-generated answers (ChatGPT, Perplexity, Bing Copilot). &ldquo;Block all&rdquo; prevents AI systems from training on or citing your content. &ldquo;Custom&rdquo; reveals individual toggles for each crawler below."
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_AI_ALLOW_ALL="Allow all AI crawlers (recommended)"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_AI_BLOCK_ALL="Block all AI crawlers"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_AI_CUSTOM="Custom — configure per crawler"

; Per-crawler labels / descriptions
PLG_SYSTEM_AIBOOST_AEO_ALLOW="Allow"
PLG_SYSTEM_AIBOOST_AEO_BLOCK="Block"

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_GPTBOT_LABEL="GPTBot (ChatGPT / OpenAI)"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_GPTBOT_DESC="OpenAI&rsquo;s crawler used to train ChatGPT and build its browsing index. Blocking this prevents ChatGPT from citing or summarising your content in future responses."

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_CHATGPTUSER_LABEL="ChatGPT-User (ChatGPT browsing)"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_CHATGPTUSER_DESC="Used when a ChatGPT user explicitly asks it to browse or summarise a URL from your site. Blocking this prevents on-demand reading of your pages by ChatGPT users."

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_CLAUDEBOT_LABEL="ClaudeBot + Claude-Web (Anthropic)"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_CLAUDEBOT_DESC="Anthropic&rsquo;s crawlers for Claude AI. ClaudeBot crawls for training data; Claude-Web is used for live browsing. This toggle blocks both."

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_ANTHROPIC_LABEL="anthropic-ai"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_ANTHROPIC_DESC="Secondary user-agent string used by Anthropic&rsquo;s crawling infrastructure. Block alongside ClaudeBot for full coverage."

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_PERPLEXITY_LABEL="PerplexityBot"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_PERPLEXITY_DESC="Perplexity AI&rsquo;s crawler. Blocking this prevents your content from appearing in Perplexity search answers and citations."

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_GEXT_LABEL="Google-Extended (Gemini AI training)"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_GEXT_DESC="Google&rsquo;s separate crawler for AI training data (Gemini, Bard). This does NOT affect Googlebot or Google Search rankings — it only controls whether Google can use your content to train its AI models."

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_CCBOT_LABEL="CCBot (Common Crawl)"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_CCBOT_DESC="Common Crawl&rsquo;s crawler. Common Crawl data is widely used as training data by many open-source and commercial AI models (including early versions of ChatGPT). Blocking this prevents your content from entering these datasets."

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_COHERE_LABEL="cohere-ai"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_COHERE_DESC="Cohere&rsquo;s AI crawler, used for building their language model training data and enterprise AI products."

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_GOOGLEBOT_LABEL="Googlebot (Google Search)"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_GOOGLEBOT_DESC="WARNING: Blocking Googlebot will remove your site from Google Search results. Only block this if you intentionally want your site hidden from Google."

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_BINGBOT_LABEL="Bingbot (Bing / Copilot)"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_BLOCK_BINGBOT_DESC="Microsoft&rsquo;s main crawler for Bing Search and Bing Copilot. Blocking this removes your site from Bing search results and Microsoft Copilot answers."

PLG_SYSTEM_AIBOOST_AEO_ROBOTS_CUSTOM_LABEL="Custom robots.txt Content"
PLG_SYSTEM_AIBOOST_AEO_ROBOTS_CUSTOM_DESC="Paste your full custom robots.txt content here. If this field is not empty, it overrides the auto-generated robots.txt completely — the AI crawler toggles above are ignored. Use this only if you need full manual control. Example:&#10;User-agent: *&#10;Disallow: /administrator/&#10;Allow: /&#10;Sitemap: https://example.com/sitemap.xml"

; Markdown Pages
PLG_SYSTEM_AIBOOST_AEO_MARKDOWN_ENABLED_LABEL="Enable Markdown Pages"
PLG_SYSTEM_AIBOOST_AEO_MARKDOWN_ENABLED_DESC="Serves each Joomla article as a Markdown (.md) file alongside the normal HTML page. Adds a &lt;link rel=&ldquo;alternate&rdquo; type=&ldquo;text/markdown&rdquo;&gt; discovery tag so AI agents can find the Markdown version. AI agents that send &ldquo;Accept: text/markdown&rdquo; are automatically served the Markdown version. Access any article in Markdown by appending .md to the URL (e.g. /my-article.md)."

; Advanced
PLG_SYSTEM_AIBOOST_AEO_STAGING_LABEL="Staging Mode"
PLG_SYSTEM_AIBOOST_AEO_STAGING_DESC="Enable on staging or development servers to suppress all virtual file output (llms.txt, robots.txt, IndexNow key files, Markdown pages). Prevents staging content from being indexed or submitted to search engines."
