PLG_SYSTEM_JOOMLABOOST_STARTER_BANNER_DESC="Your Starter license covers this site. Some advanced features require a Developer or Agency plan. <a href=""https://joomlaboost.com/pricing"" target=""_blank"">Upgrade &rarr;</a>"

; Pro Feature Gate (shown to Starter / unlicensed users)
PLG_SYSTEM_JOOMLABOOST_PRO_FEATURE_LABEL="Developer / Agency Feature"
PLG_SYSTEM_JOOMLABOOST_INDEXNOW_PRO_DESC="<strong>IndexNow instant indexing</strong> is available on the Developer and Agency plans. Notify Bing, Yandex and Seznam the moment content is published &mdash; new pages indexed in minutes, not days. <a href=""https://joomlaboost.com/pricing"" target=""_blank"">Upgrade to unlock &rarr;</a>"
PLG_SYSTEM_JOOMLABOOST_LLMSTXT_PRO_DESC="<strong>LLMs.txt AI crawler visibility</strong> is available on the Developer and Agency plans. Help ChatGPT, Claude, Perplexity and Gemini understand your site structure automatically. <a href=""https://joomlaboost.com/pricing"" target=""_blank"">Upgrade to unlock &rarr;</a>"
PLG_SYSTEM_JOOMLABOOST_EVENTS_PRO_DESC="<strong>Event Schema rich results</strong> are available on the Developer and Agency plans. Events appear in Google Search, Google Maps and AI Overviews. <a href=""https://joomlaboost.com/pricing"" target=""_blank"">Upgrade to unlock &rarr;</a>"
PLG_SYSTEM_JOOMLABOOST_MANUAL_FAQ_PRO_DESC="<strong>Multi-language manual FAQ management</strong> is available on the Developer and Agency plans. Add custom FAQ items with per-language input and global FAQ scope control. <a href=""https://joomlaboost.com/pricing"" target=""_blank"">Upgrade to unlock &rarr;</a>"

