openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: license
    description: License validation operations (Lemon Squeezy — currently mocked)
  - name: updates
    description: License-gated auto-update server consumed by Joomla's update manager
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /license/validate:
    post:
      operationId: validateLicense
      tags: [license]
      summary: Validate a per-SKU license key
      description: |
        Validate a license key against a SKU. Today this is a mock that
        recognises four key prefixes (AB-VALID-*, AB-EXPIRED-*, AB-LIMIT-*,
        AB-DEACT-*). The shape matches the planned Lemon Squeezy integration
        so swapping the mock for the real LS API is a single-file change.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseValidateRequest"
      responses:
        "200":
          description: Validation result (check `valid` field — false means invalid/expired/limit_reached/deactivated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseValidateResponse"
        "400":
          description: Bad request — missing license_key or invalid sku
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseValidateResponse"
  /license/deactivate:
    post:
      operationId: deactivateLicense
      tags: [license]
      summary: Deactivate a license for the current site
      description: |
        Release one activation slot so the license can be moved to another
        site. Mock today; will call POST /v1/licenses/deactivate on Lemon
        Squeezy once the vendor account is live.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseDeactivateRequest"
      responses:
        "200":
          description: Deactivation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseDeactivateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseDeactivateResponse"
  /license/heartbeat:
    post:
      operationId: licenseHeartbeat
      tags: [license]
      summary: Phone-home heartbeat + strict domain binding
      description: |
        Called every 7 days by the AI Boost Joomla plugin from the admin
        side. Server validates the license key, binds it to (domain,
        install_id) on the first call, detects domain collisions, and
        signals whether Pro features should be unlocked, soft-warned, or
        hard-disabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseHeartbeatPayload"
      responses:
        "200":
          description: Heartbeat verdict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseHeartbeatResult"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseHeartbeatResult"
  /updates/{packageSlug}.xml:
    get:
      operationId: getPackageUpdates
      tags: [updates]
      summary: License-gated Joomla update manifest
      description: |
        Returns the Joomla `<updates>` XML manifest for the given package
        slug. `pkg_aiboost` (free) always returns the latest release.
        `pkg_aiboost_pro` requires a valid `key` whose `domain` matches one
        of the activated domains on the license; anything else returns an
        empty but valid `<updates/>` document so Joomla silently shows no
        updates available.
      parameters:
        - in: path
          name: packageSlug
          required: true
          schema:
            type: string
            enum: [pkg_aiboost, pkg_aiboost_pro]
      x-query-parameters: |
        Joomla appends these via the onInstallerBeforeFetchManifest hook:
          key    — license key (required for pkg_aiboost_pro)
          domain — site hostname (required for pkg_aiboost_pro)
          v      — currently installed version (analytics only)
        They are intentionally omitted from the spec to keep the
        generated typed client free of name collisions; the server
        reads them directly from req.query.
      responses:
        "200":
          description: Joomla update manifest XML (possibly empty)
          content:
            application/xml:
              schema:
                type: string
        "404":
          description: Unknown package slug
          content:
            application/xml:
              schema:
                type: string
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    LicenseSku:
      type: string
      enum: [schema, og, hreflang, code, aeo, bundle]
      description: AI Boost SKU identifier
    LicenseStatus:
      type: string
      enum: [active, expired, invalid, limit_reached, deactivated]
    LicenseValidateRequest:
      type: object
      properties:
        license_key:
          type: string
          description: License key entered by the admin
        sku:
          $ref: "#/components/schemas/LicenseSku"
        site_domain:
          type: string
          description: JUri::root() value from the Joomla install, stored for activation tracking
      required:
        - license_key
        - sku
        - site_domain
    LicenseValidateResponse:
      type: object
      properties:
        valid:
          type: boolean
        status:
          $ref: "#/components/schemas/LicenseStatus"
        sku:
          oneOf:
            - $ref: "#/components/schemas/LicenseSku"
            - type: "null"
        activations_remaining:
          type: integer
          description: Activation slots still available (0 when limit_reached)
        expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        message:
          type: string
        mock:
          type: boolean
          description: Always true while the mock is in place; will be absent or false in production
      required:
        - valid
        - status
        - sku
        - activations_remaining
        - expires_at
        - message
        - mock
    LicenseDeactivateRequest:
      type: object
      properties:
        license_key:
          type: string
        site_domain:
          type: string
      required:
        - license_key
        - site_domain
    LicenseHeartbeatVerdict:
      type: string
      enum: [ok, soft_warning, hard_disabled, domain_mismatch]
      description: |
        ok — license valid, Pro features stay enabled.
        soft_warning — license expired or non-active; show warning, Pro still on inside the grace period.
        hard_disabled — license unknown or grace period exhausted; Pro features must be turned off.
        domain_mismatch — key was already bound to a different domain/install; show collision warning.
    LicenseHeartbeatPayload:
      type: object
      properties:
        license_key:
          type: string
        domain:
          type: string
          description: JUri::getInstance()->getHost() at the time of the heartbeat
        plugin_version:
          type: string
          description: Currently installed AI Boost package version (analytics only)
        install_id:
          type: string
          description: UUIDv4 generated once in pkg_script.php postflight, stable per Joomla install
      required:
        - license_key
        - domain
        - install_id
    LicenseHeartbeatResult:
      type: object
      properties:
        verdict:
          $ref: "#/components/schemas/LicenseHeartbeatVerdict"
        status:
          oneOf:
            - type: string
            - type: "null"
        expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        message:
          type: string
        grace_period_days:
          type: integer
          description: Days of grace after the first soft_warning before Pro features hard-disable
        domain_collision:
          type: boolean
      required:
        - verdict
        - status
        - expires_at
        - message
        - grace_period_days
        - domain_collision
    LicenseDeactivateResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        mock:
          type: boolean
      required:
        - success
        - message
        - mock
