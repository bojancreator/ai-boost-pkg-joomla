openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: license
    description: License validation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /license/validate:
    post:
      operationId: validateLicense
      tags: [license]
      summary: Validate a license key against Gumroad
      description: Verifies a license key and returns activation details including buyer email, tier, activation date, and remaining activations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseValidateRequest"
      responses:
        "200":
          description: Validation result (check `valid` field — false means invalid/expired)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseValidateResponse"
        "400":
          description: Bad request
        "503":
          description: License validation not configured on server
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    LicenseValidateRequest:
      type: object
      properties:
        license_key:
          type: string
          description: UUID-format license key from Gumroad
        site_url:
          type: string
          description: URL of the site being activated (stored for display purposes)
      required:
        - license_key
    LicenseValidateResponse:
      type: object
      properties:
        valid:
          type: boolean
          description: Whether the license key is valid and active
        status:
          type: string
          enum: [active, expiring_soon, invalid, deactivated]
          description: Precise license state — active, expiring_soon (subscription ending within 30 days), deactivated (refunded/chargebacked), or invalid (key not found/bad format)
        error:
          type: string
          description: Error message when valid is false
        tier:
          type: string
          description: License tier — starter, developer, or agency
        email:
          type: string
          description: Buyer email address from Gumroad
        activated_at:
          type: string
          description: ISO 8601 timestamp of the original purchase/activation
        uses:
          type: integer
          description: Number of times this license has been activated
        max_uses:
          type: integer
          description: Maximum allowed activations (-1 means unlimited)
        remaining_activations:
          type: integer
          description: Remaining activations allowed (-1 means unlimited)
        site_url:
          type: string
          description: Site URL that was passed in the request
      required:
        - valid
