name: Deploy to Staging (FTP/FTPS)

# Auto-deploy disabled: manual runs only. We install plugin ZIP via Joomla backend.
on:
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip deploy]') }}
    runs-on: ubuntu-latest
    concurrency:
      group: staging-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # FTP/FTPS deploy – no longer relevant since templates were moved
      # from src/templates/ to organized plugin/ structure

      - name: Deploy notice
        run: |
          echo "🚀 Repository modernized - template deployment no longer needed"
          echo "📦 Use manual ZIP install through Joomla admin instead"
          echo "🏗️ New structure: plugin/ directory contains all plugin files"
