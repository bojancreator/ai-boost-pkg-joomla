name: Deploy to Staging (FTP/FTPS)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/plugins/system/offroadstage/**
      - src/templates/yootheme_offroad/**
      - .github/workflows/deploy-staging.yml

jobs:
  deploy:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip deploy]') }}
    runs-on: ubuntu-latest
    concurrency:
      group: staging-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # FTP/FTPS deploy â€“ dve ciljne putanje
      - name: Upload offroadstage via FTP
        if: ${{ hashFiles('src/plugins/system/offroadstage/**') != '' }}
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65
        with:
          server: ${{ secrets.STAGING_FTP_HOST }}
          username: ${{ secrets.STAGING_FTP_USER }}
          password: ${{ secrets.STAGING_FTP_PASS }}
          protocol: ftp
          security: loose
          local-dir: src/plugins/system/offroadstage/
          server-dir: ${{ secrets.STAGING_DOCROOT_RELATIVE }}/plugins/system/offroadstage/
          dangerous-clean-slate: true
          log-level: verbose
          timeout: 120000

      - name: Upload YOOtheme child via FTP
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65
        with:
          server: ${{ secrets.STAGING_FTP_HOST }}
          username: ${{ secrets.STAGING_FTP_USER }}
          password: ${{ secrets.STAGING_FTP_PASS }}
          protocol: ftp
          security: loose
          local-dir: src/templates/yootheme_offroad/
          server-dir: ${{ secrets.STAGING_DOCROOT_RELATIVE }}/templates/yootheme_offroad/
          dangerous-clean-slate: true
          log-level: verbose
          timeout: 120000
