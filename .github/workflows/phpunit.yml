name: PHPUnit — Service DI Tests (PHP 8.2–8.5)

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  phpunit:
    name: phpunit (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # phpunit 11.x (locked in composer.lock) requires PHP >= 8.2, so the
        # test runner cannot execute on 8.1. The product still supports 8.1 —
        # that floor is covered by PHPStan (phpqa.yml) and the standalone
        # safety tests (ci.yml), which run on the 8.1 runtime.
        php-version: ["8.2", "8.3", "8.4", "8.5"]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@ec406be512d7077f68eed36e63f4d91bc006edc4
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPUnit — service injection tests
        run: vendor/bin/phpunit --configuration phpunit.xml
