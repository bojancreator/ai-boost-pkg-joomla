name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Optional: enable manual runs from Actions tab
  workflow_dispatch:

jobs:
  phpqa:
    name: phpqa (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # AI Boost for Joomla supports PHP 8.1 – 8.4 (per joomlaboost.xml <php_minimum>
        # and the documented support matrix in replit.md). PHP 8.5 is intentionally
        # excluded for now: it ships in Nov 2025 and PHPStan 1.x does not yet
        # officially support analysing 8.5 syntax. Re-evaluate once PHPStan 2.x
        # (or a 1.x release with explicit 8.5 support) is pinned in composer.json.
        php-version: ["8.1", "8.2", "8.3", "8.4"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup PHP
        uses: shivammathur/setup-php@ec406be512d7077f68eed36e63f4d91bc006edc4
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer
      - name: Show PHP and Composer versions
        run: |
          php -v
          composer -V
          composer validate --no-check-publish --strict
      - name: Cache Composer
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: |
            ~/.composer/cache
          # Cache key includes the PHP version so each matrix cell gets its own
          # warm cache and we never reuse a cache built with a different Python ABI.
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-composer-
            ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Fix vendor permissions
        run: chmod +x vendor/bin/*
      - name: PHPCS
        run: composer lint
      - name: PHPStan
        run: composer stan
      - name: Canonical tag regression tests
        run: composer test

  # Note: Build artifacts moved to a separate manual workflow.
